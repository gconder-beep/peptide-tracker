<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f6f7f9">
<title>Peptide &amp; Vitamin Tracker</title>
<style>
:root{
  color-scheme: light;
  --bg:#f6f7f9;--card:#ffffff;--ink:#1a2230;--muted:#6b7688;--line:#e6e9ef;
  --brand:#3b6ef5;--brand-soft:#eaf0ff;--green:#1f9d63;--green-soft:#e6f6ee;
  --amber:#b8860b;--amber-soft:#fdf3e0;--gray-soft:#eef1f5;
  --radius:14px;--shadow:0 1px 3px rgba(20,30,50,.06),0 6px 20px rgba(20,30,50,.05);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto;padding:20px 18px 90px}
header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:2px}
h1{font-size:22px;margin:0;letter-spacing:-.3px}
.date{color:var(--muted);font-size:13px;margin-top:2px}
.userbar{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted)}
.tabs{display:flex;gap:6px;margin:18px 0 16px;background:var(--gray-soft);padding:5px;border-radius:12px;flex-wrap:wrap}
.tab{flex:1;min-width:78px;text-align:center;padding:9px 8px;border-radius:9px;cursor:pointer;font-weight:600;font-size:13.5px;color:var(--muted);user-select:none;border:none;background:transparent}
.tab.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.section-title{font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:2px 0 12px}
.muted{color:var(--muted)}
.empty{color:var(--muted);text-align:center;padding:26px 10px;font-size:14px}
.dose{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.dose:first-of-type{border-top:none}
.check{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;transition:.12s}
.check svg{width:15px;height:15px;opacity:0;transition:.12s}
.check.done{background:var(--green);border-color:var(--green)}
.check.done svg{opacity:1}
.dose-main{flex:1;min-width:0}
.dose-name{font-weight:650}
.dose-sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;vertical-align:middle;margin-left:6px}
.pill.week{background:var(--brand-soft);color:var(--brand)}
.pill.days{background:var(--green-soft);color:var(--green)}
.pill.daily{background:var(--gray-soft);color:var(--muted)}
.pill.paused{background:var(--amber-soft);color:var(--amber)}
.weekgrid{display:grid;grid-template-columns:130px repeat(7,1fr);gap:6px;align-items:center;font-size:12px}
.weekgrid .hd{color:var(--muted);font-weight:700;text-align:center;font-size:11px}
.weekgrid .hd.today{color:var(--brand)}
.weekgrid .rowname{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell{height:30px;border-radius:7px;background:var(--gray-soft);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted)}
.cell.due{background:#fff;border:1.5px dashed #cdd5e3}
.cell.due.logged{background:var(--green);border:none;color:#fff}
.cell.na{background:transparent;cursor:default}
.cell.todaycol{outline:2px solid var(--brand-soft)}
.item{border-top:1px solid var(--line);padding:14px 0}
.item:first-child{border-top:none}
.item-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.item-title{font-weight:650;font-size:15.5px}
.item-meta{font-size:12.5px;color:var(--muted);margin-top:2px}
textarea,input,select{font-family:inherit;font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 10px;width:100%;background:#fff}
textarea{resize:vertical;min-height:52px}
.notes-label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px}
.btn{border:none;border-radius:9px;padding:8px 13px;font-weight:650;font-size:13px;cursor:pointer;background:var(--brand);color:#fff}
.btn.ghost{background:var(--gray-soft);color:var(--ink)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger{background:#fdecec;color:#c23b3b}
.btn:disabled{opacity:.5;cursor:default}
.row-actions{display:flex;gap:7px;flex-wrap:wrap}
.hist{font-size:12px;color:var(--muted);margin-top:8px}
.hist-chip{display:inline-block;background:var(--gray-soft);border-radius:6px;padding:2px 7px;margin:2px 4px 2px 0;font-size:11.5px}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formgrid .full{grid-column:1/-1}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.daysel{display:flex;gap:5px;flex-wrap:wrap}
.daysel button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 9px;font-size:12px;cursor:pointer;font-weight:600;color:var(--muted)}
.daysel button.on{background:var(--brand);border-color:var(--brand);color:#fff}
.journal-entry{border-top:1px solid var(--line);padding:11px 0}
.journal-entry:first-child{border-top:none}
.journal-date{font-size:12px;color:var(--muted);font-weight:600}
.journal-text{margin-top:3px;white-space:pre-wrap}
.addbar{display:flex;justify-content:flex-end;margin-top:4px}
dialog{border:none;border-radius:16px;padding:0;box-shadow:0 10px 50px rgba(20,30,50,.25);max-width:460px;width:92%}
dialog::backdrop{background:rgba(20,30,50,.35)}
.dlg-body{padding:20px}
.dlg-title{font-size:17px;font-weight:700;margin:0 0 14px}
.dlg-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
/* auth */
#auth{max-width:380px;margin:9vh auto 0;padding:0 18px}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px}
.auth-card h1{font-size:21px;margin:0 0 4px}
.auth-sub{color:var(--muted);font-size:13.5px;margin-bottom:18px}
.auth-card .field{margin-bottom:12px}
.auth-actions{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.auth-toggle{text-align:center;font-size:13px;color:var(--muted);margin-top:14px}
.link{color:var(--brand);cursor:pointer;font-weight:600}
.msg{font-size:13px;padding:9px 11px;border-radius:9px;margin-top:12px;display:none}
.msg.err{display:block;background:#fdecec;color:#c23b3b}
.msg.ok{display:block;background:var(--green-soft);color:var(--green)}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.savenote{font-size:11.5px;color:var(--muted);text-align:right;height:14px;margin-top:2px}
@media(max-width:560px){.weekgrid{grid-template-columns:96px repeat(7,1fr);font-size:11px}.formgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth" style="display:none">
  <div class="auth-card">
    <h1>Peptide &amp; Vitamin Tracker</h1>
    <div class="auth-sub" id="authSub">Sign in to sync across your devices.</div>
    <div class="field"><label>Email</label><input id="authEmail" type="email" autocomplete="username" placeholder="you@email.com"></div>
    <div class="field"><label>Password</label><input id="authPass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <div class="auth-actions">
      <button class="btn" id="authPrimary">Sign in</button>
    </div>
    <div class="msg" id="authMsg"></div>
    <div class="auth-toggle" id="authToggle">First time here? <span class="link" id="toggleMode">Create an account</span></div>
  </div>
</div>

<!-- APP -->
<div class="wrap" id="app" style="display:none">
  <header class="top">
    <div>
      <h1>Peptide &amp; Vitamin Tracker</h1>
      <div class="date" id="todayLabel"></div>
    </div>
    <div class="userbar">
      <span id="whoami"></span>
      <button class="btn ghost sm" id="refreshBtn">Refresh</button>
      <button class="btn ghost sm" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="today">Today</button>
    <button class="tab" data-tab="week">This Week</button>
    <button class="tab" data-tab="items">Items</button>
    <button class="tab" data-tab="journal">Journal</button>
  </div>

  <div id="tab-today">
    <div class="card"><div class="section-title">Due today</div><div id="todayList"></div></div>
    <div class="card" id="pausedCard"><div class="section-title">Not started / paused</div><div id="pausedList"></div></div>
  </div>

  <div id="tab-week" style="display:none">
    <div class="card">
      <div class="section-title">This week &nbsp;·&nbsp; <span class="muted" id="weekRange"></span></div>
      <div id="weekGrid"></div>
      <div class="hint">Tap a cell to log or un-log a dose. Dashed = scheduled, green = taken.</div>
    </div>
  </div>

  <div id="tab-items" style="display:none">
    <div class="addbar"><button class="btn" id="addItemBtn">+ Add item</button></div>
    <div class="card"><div class="section-title">All items</div><div id="itemsList"></div></div>
  </div>

  <div id="tab-journal" style="display:none">
    <div class="card">
      <div class="section-title">New journal entry</div>
      <textarea id="journalInput" placeholder="How are you feeling? Energy, sleep, side effects, anything you noticed today…"></textarea>
      <div class="addbar" style="margin-top:10px"><button class="btn" id="addJournalBtn">Save entry</button></div>
    </div>
    <div class="card"><div class="section-title">History</div><div id="journalList"></div></div>
  </div>
</div>

<dialog id="itemDialog">
  <div class="dlg-body">
    <h3 class="dlg-title" id="dlgTitle">Add item</h3>
    <div class="formgrid">
      <div class="field full"><label>Name</label><input id="fName" placeholder="e.g. Vitamin D3"></div>
      <div class="field"><label>Dose</label><input id="fDose" placeholder="e.g. 20 units / 250mcg"></div>
      <div class="field"><label>Frequency</label>
        <select id="fFreq">
          <option value="daily">Every day</option>
          <option value="weekdays">Specific days</option>
          <option value="weekly">Once a week</option>
        </select>
      </div>
      <div class="field full" id="daysWrap" style="display:none">
        <label id="daysLabel">Days</label>
        <div class="daysel" id="daySelect"></div>
      </div>
      <div class="field full"><label>Status</label>
        <select id="fActive"><option value="true">Active</option><option value="false">Not started / paused</option></select>
      </div>
    </div>
    <div class="dlg-actions">
      <button class="btn danger sm" id="deleteItemBtn" style="margin-right:auto;display:none">Delete</button>
      <button class="btn ghost" id="cancelDlg">Cancel</button>
      <button class="btn" id="saveItem">Save</button>
    </div>
  </div>
</dialog>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = "https://esnzndmoqykscjymofnh.supabase.co";
const SUPABASE_KEY = "sb_publishable_oUZDuAH3bE7WZJB43obvLg_YKRXmArS";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const parseD = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const fmtD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const esc = s => (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let state = { items:[], logs:[], journal:[] };
const $ = id => document.getElementById(id);

/* ---------------- AUTH ---------------- */
let mode = "signin";
function showAuthMsg(text, kind){ const m=$("authMsg"); m.textContent=text; m.className="msg "+kind; }
function clearAuthMsg(){ $("authMsg").className="msg"; }

$("toggleMode").onclick = () => {
  mode = mode==="signin" ? "signup" : "signin";
  clearAuthMsg();
  if(mode==="signup"){
    $("authSub").textContent="Create your account — data syncs everywhere you sign in.";
    $("authPrimary").textContent="Create account";
    $("authPass").setAttribute("autocomplete","new-password");
    $("authToggle").innerHTML='Already have an account? <span class="link" id="toggleMode2">Sign in</span>';
  }else{
    $("authSub").textContent="Sign in to sync across your devices.";
    $("authPrimary").textContent="Sign in";
    $("authPass").setAttribute("autocomplete","current-password");
    $("authToggle").innerHTML='First time here? <span class="link" id="toggleMode2">Create an account</span>';
  }
  $("toggleMode2").onclick = $("toggleMode").onclick;
};

$("authPrimary").onclick = async () => {
  const email=$("authEmail").value.trim(), pass=$("authPass").value;
  if(!email||!pass){ showAuthMsg("Enter your email and password.","err"); return; }
  const btn=$("authPrimary"); btn.disabled=true; const label=btn.textContent;
  btn.innerHTML='<span class="spinner"></span>'+(mode==="signup"?"Creating…":"Signing in…");
  clearAuthMsg();
  try{
    if(mode==="signup"){
      const {data,error} = await sb.auth.signUp({email,password:pass});
      if(error) throw error;
      if(!data.session){ // confirmation still required
        showAuthMsg("Account created. Check your email to confirm, then sign in.","ok");
        btn.disabled=false; btn.textContent=label; return;
      }
    }else{
      const {error} = await sb.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
    }
  }catch(e){
    showAuthMsg(e.message||"Something went wrong.","err");
    btn.disabled=false; btn.textContent=label; return;
  }
  // onAuthStateChange handles the rest
};

$("authPass").addEventListener("keydown", e=>{ if(e.key==="Enter") $("authPrimary").click(); });

$("logoutBtn").onclick = async () => { await sb.auth.signOut(); };
$("refreshBtn").onclick = async () => { await loadAll(); };

sb.auth.onAuthStateChange(async (event, session) => {
  if(session && session.user){
    $("auth").style.display="none";
    $("app").style.display="";
    $("whoami").textContent = session.user.email;
    await loadAll();
  }else{
    $("app").style.display="none";
    $("auth").style.display="";
    const btn=$("authPrimary"); btn.disabled=false; btn.textContent = mode==="signup"?"Create account":"Sign in";
  }
});

/* ---------------- DATA ---------------- */
async function loadAll(){
  const [it,lg,jr] = await Promise.all([
    sb.from("items").select("*").order("created_at",{ascending:true}),
    sb.from("logs").select("item_id,date"),
    sb.from("journal").select("*").order("date",{ascending:false}).order("created_at",{ascending:false})
  ]);
  state.items = it.data||[];
  state.logs = lg.data||[];
  state.journal = jr.data||[];
  render();
}

async function toggleLog(itemId, dateS){
  const has = state.logs.some(l=>l.item_id===itemId && l.date===dateS);
  if(has){
    state.logs = state.logs.filter(l=>!(l.item_id===itemId && l.date===dateS));
    render();
    await sb.from("logs").delete().eq("item_id",itemId).eq("date",dateS);
  }else{
    state.logs.push({item_id:itemId,date:dateS});
    render();
    await sb.from("logs").insert({item_id:itemId,date:dateS});
  }
}
window.toggleLog = toggleLog;

async function activate(id){
  const it=state.items.find(i=>i.id===id); if(!it) return;
  it.active=true; render();
  await sb.from("items").update({active:true}).eq("id",id);
}
window.activate = activate;

/* ---------------- SCHEDULE HELPERS ---------------- */
function dueOn(item,dow){ if(!item.active) return false; if(item.freq==="daily") return true; return (item.days||[]).includes(dow); }
function logged(itemId,dateS){ return state.logs.some(l=>l.item_id===itemId && l.date===dateS); }
function freqPill(item){
  if(!item.active) return '<span class="pill paused">paused</span>';
  if(item.freq==="daily") return '<span class="pill daily">daily</span>';
  if(item.freq==="weekly") return `<span class="pill week">weekly · ${DOW[item.days?.[0]] ?? "?"}</span>`;
  return `<span class="pill days">${(item.days||[]).map(d=>DOW[d]).join("/")}</span>`;
}

/* ---------------- TODAY ---------------- */
function renderToday(){
  const dow=new Date().getDay(), ds=todayStr();
  const due=state.items.filter(it=>dueOn(it,dow));
  const el=$("todayList");
  el.innerHTML = due.length ? due.map(it=>{
    const done=logged(it.id,ds);
    return `<div class="dose">
      <div class="check ${done?'done':''}" onclick="toggleLog('${it.id}','${ds}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5"><path d="M5 12l5 5L20 6"/></svg></div>
      <div class="dose-main"><div class="dose-name">${esc(it.name)} ${freqPill(it)}</div>
      <div class="dose-sub">${esc(it.dose)}</div></div></div>`;
  }).join("") : '<div class="empty">Nothing scheduled for today. Enjoy the day off. 🎉</div>';

  const paused=state.items.filter(it=>!it.active);
  const pc=$("pausedCard");
  if(!paused.length){ pc.style.display="none"; }
  else{ pc.style.display="";
    $("pausedList").innerHTML=paused.map(it=>`<div class="dose"><div class="dose-main">
      <div class="dose-name">${esc(it.name)} <span class="pill paused">not started</span></div>
      <div class="dose-sub">${esc(it.dose)}</div></div>
      <button class="btn ghost sm" onclick="activate('${it.id}')">Start</button></div>`).join("");
  }
}

/* ---------------- WEEK ---------------- */
function weekStart(){ const d=new Date(); d.setDate(d.getDate()-d.getDay()); d.setHours(0,0,0,0); return d; }
function renderWeek(){
  const ws=weekStart(); const days=[...Array(7)].map((_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
  const todayS=todayStr();
  $("weekRange").textContent = `${DOW[0]} ${days[0].getMonth()+1}/${days[0].getDate()} – ${DOW[6]} ${days[6].getMonth()+1}/${days[6].getDate()}`;
  const active=state.items.filter(i=>i.active);
  let html='<div class="weekgrid"><div class="hd"></div>';
  days.forEach(d=>{ const t=fmtD(d)===todayS; html+=`<div class="hd ${t?'today':''}">${DOW[d.getDay()]}<br>${d.getDate()}</div>`; });
  html+='</div>';
  if(!active.length){ $("weekGrid").innerHTML=html+'<div class="empty">No active items yet.</div>'; return; }
  html+='<div class="weekgrid" style="margin-top:6px">';
  active.forEach(it=>{
    html+=`<div class="rowname" title="${esc(it.name)}">${esc(it.name)}</div>`;
    days.forEach(d=>{
      const ds=fmtD(d), due=dueOn(it,d.getDay()), lg=logged(it.id,ds), tc=ds===todayS?'todaycol':'';
      html += due ? `<div class="cell due ${lg?'logged':''} ${tc}" onclick="toggleLog('${it.id}','${ds}')">${lg?'✓':''}</div>`
                  : `<div class="cell na ${tc}"></div>`;
    });
  });
  html+='</div>';
  $("weekGrid").innerHTML=html;
}

/* ---------------- ITEMS ---------------- */
function renderItems(){
  const el=$("itemsList");
  if(!state.items.length){
    el.innerHTML='<div class="empty">No items yet. Tap <b>+ Add item</b> above to add your first peptide or vitamin.</div>';
    return;
  }
  el.innerHTML=state.items.map(it=>{
    const mine=state.logs.filter(l=>l.item_id===it.id).map(l=>l.date).sort((a,b)=>b.localeCompare(a));
    const recent=mine.slice(0,6);
    const hist=recent.length? recent.map(d=>`<span class="hist-chip">${d.slice(5)}</span>`).join("") : '<span class="muted">no doses logged yet</span>';
    return `<div class="item">
      <div class="item-head">
        <div><div class="item-title">${esc(it.name)} ${freqPill(it)}</div>
        <div class="item-meta">${esc(it.dose)} &nbsp;·&nbsp; ${mine.length} dose${mine.length===1?'':'s'} logged</div></div>
        <div class="row-actions"><button class="btn ghost sm" onclick="editItem('${it.id}')">Edit</button></div>
      </div>
      <div class="notes-label">Notes &amp; effects</div>
      <textarea data-notes="${it.id}" placeholder="Log any effects you feel — energy, sleep, appetite, mood, side effects…">${esc(it.notes||"")}</textarea>
      <div class="savenote" data-savenote="${it.id}"></div>
      <div class="hist"><b>Recent doses:</b> ${hist}</div>
    </div>`;
  }).join("");
  el.querySelectorAll("textarea[data-notes]").forEach(t=>{
    const save=async()=>{ const id=t.dataset.notes;
      const flag=document.querySelector(`[data-savenote="${id}"]`);
      await sb.from("items").update({notes:t.value}).eq("id",id);
      const it=state.items.find(i=>i.id===id); if(it) it.notes=t.value;
      if(flag){ flag.textContent="Saved ✓"; setTimeout(()=>{flag.textContent="";},1500); }
    };
    t.addEventListener("change",save);
  });
}
window.editItem = openDlg;

/* ---------------- JOURNAL ---------------- */
function renderJournal(){
  const el=$("journalList");
  if(!state.journal.length){ el.innerHTML='<div class="empty">No entries yet.</div>'; return; }
  el.innerHTML=state.journal.map(e=>`<div class="journal-entry">
    <div class="journal-date">${prettyDate(e.date)} <button class="btn danger sm" style="float:right" onclick="delJournal('${e.id}')">×</button></div>
    <div class="journal-text">${esc(e.body)}</div></div>`).join("");
}
function prettyDate(s){ const d=parseD(s); return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }
async function delJournal(id){ state.journal=state.journal.filter(e=>e.id!==id); renderJournal(); await sb.from("journal").delete().eq("id",id); }
window.delJournal = delJournal;

$("addJournalBtn").onclick=async()=>{
  const t=$("journalInput"); const v=t.value.trim(); if(!v) return;
  const btn=$("addJournalBtn"); btn.disabled=true;
  const {data,error}=await sb.from("journal").insert({body:v,date:todayStr()}).select();
  btn.disabled=false;
  if(error){ alert("Couldn't save: "+error.message); return; }
  t.value=""; if(data&&data[0]) state.journal.unshift(data[0]); renderJournal();
};

/* ---------------- DIALOG ---------------- */
const dlg=$("itemDialog"); let editingId=null;
function renderDaySelect(sel){
  const box=$("daySelect");
  box.innerHTML=DOW.map((d,i)=>`<button type="button" data-d="${i}" class="${sel.includes(i)?'on':''}">${d}</button>`).join("");
  box.querySelectorAll("button").forEach(b=>b.onclick=()=>b.classList.toggle("on"));
}
function syncDaysVisibility(){
  const f=$("fFreq").value;
  $("daysLabel").textContent = f==="weekly"?"Day of week":"Days";
  $("daysWrap").style.display = f==="daily" ? "none" : "";
}
$("fFreq").onchange=syncDaysVisibility;
$("addItemBtn").onclick=()=>openDlg(null);

function openDlg(id){
  editingId=id;
  const del=$("deleteItemBtn");
  if(id){
    const it=state.items.find(i=>i.id===id);
    $("dlgTitle").textContent="Edit item";
    $("fName").value=it.name; $("fDose").value=it.dose||"";
    $("fFreq").value=it.freq; $("fActive").value=String(it.active);
    renderDaySelect(it.days||[]); del.style.display="";
  }else{
    $("dlgTitle").textContent="Add item";
    $("fName").value=""; $("fDose").value="";
    $("fFreq").value="daily"; $("fActive").value="true";
    renderDaySelect([]); del.style.display="none";
  }
  syncDaysVisibility(); dlg.showModal();
}
$("cancelDlg").onclick=()=>dlg.close();

$("deleteItemBtn").onclick=async()=>{
  if(editingId && confirm("Delete this item? Its logged doses will also be removed.")){
    const id=editingId; state.items=state.items.filter(i=>i.id!==id); dlg.close(); render();
    await sb.from("items").delete().eq("id",id);
  }
};

$("saveItem").onclick=async()=>{
  const name=$("fName").value.trim(); if(!name){alert("Name required");return;}
  const dose=$("fDose").value.trim();
  const freq=$("fFreq").value;
  const active=$("fActive").value==="true";
  let days=[...document.querySelectorAll("#daySelect button.on")].map(b=>+b.dataset.d);
  if(freq==="weekly" && days.length>1) days=[days[0]];
  if(freq==="daily") days=[];
  if(freq!=="daily" && !days.length){ alert("Pick at least one day"); return; }
  const btn=$("saveItem"); btn.disabled=true;
  if(editingId){
    await sb.from("items").update({name,dose,freq,active,days}).eq("id",editingId);
  }else{
    await sb.from("items").insert({name,dose,freq,active,days,notes:""});
  }
  btn.disabled=false; dlg.close(); await loadAll();
};

/* ---------------- TABS ---------------- */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  ["today","week","items","journal"].forEach(n=>$("tab-"+n).style.display = n===t.dataset.tab?"":"none");
});

function render(){ renderToday(); renderWeek(); renderItems(); renderJournal(); }
$("todayLabel").textContent = new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});

// refetch when returning to the tab (near-live cross-device sync)
document.addEventListener("visibilitychange",()=>{ if(!document.hidden && $("app").style.display!=="none") loadAll(); });

// initial session check
(async()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(session && session.user){
    $("auth").style.display="none"; $("app").style.display="";
    $("whoami").textContent=session.user.email; await loadAll();
  }else{
    $("auth").style.display="";
  }
})();
</script>
</body>
</html>
